<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&A Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F0E;--bg2:#161614;--bg3:#1E1E1B;--bg4:#252521;
  --border:#2A2A26;--border2:#333330;
  --text:#F0EDE6;--text2:#9B9890;--text3:#5A5854;
  --gold:#C9A84C;--gold2:#E8C870;--gold-bg:rgba(201,168,76,0.08);--gold-border:rgba(201,168,76,0.2);
  --green:#4A9B6E;--green-bg:rgba(74,155,110,0.1);--green-border:rgba(74,155,110,0.25);
  --amber:#C97B2A;--amber-bg:rgba(201,123,42,0.1);--amber-border:rgba(201,123,42,0.25);
  --red:#B85454;--red-bg:rgba(184,84,84,0.1);--red-border:rgba(184,84,84,0.25);
  --blue:#4A7BB8;--blue-bg:rgba(74,123,184,0.1);--blue-border:rgba(74,123,184,0.25);
  --purple:#8B5CF6;--purple-bg:rgba(139,92,246,0.1);--purple-border:rgba(139,92,246,0.25);
  --radius:6px;--radius-lg:10px;--radius-xl:14px;
  --shadow:0 2px 8px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.4);
  --font-display:'Playfair Display',serif;--font-sans:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  --sidebar:240px;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;display:flex}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-logo{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-family:var(--font-display);font-size:20px;font-weight:500;color:var(--gold);letter-spacing:0.02em}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:0.05em;text-transform:uppercase}
.sidebar-nav{flex:1;padding:1rem 0;overflow-y:auto}
.nav-section{margin-bottom:1.5rem}
.nav-label{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;padding:0 1.25rem;margin-bottom:0.5rem}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 1.25rem;cursor:pointer;color:var(--text2);transition:all 0.15s;font-size:13.5px;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--gold);background:var(--gold-bg);border-left-color:var(--gold)}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.7}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:1rem 1.25rem;border-top:1px solid var(--border)}
.sidebar-user{font-size:12px;color:var(--text3)}
.sidebar-user strong{display:block;color:var(--text2);font-size:13px;margin-bottom:2px}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50}
.topbar-title{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--text)}
.topbar-title span{color:var(--gold)}
.topbar-actions{display:flex;gap:10px;align-items:center}
.content{padding:2rem;flex:1}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;font-family:var(--font-sans);white-space:nowrap}
.btn-primary{background:var(--gold);color:#0F0F0E}
.btn-primary:hover{background:var(--gold2)}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.btn-secondary:hover{color:var(--text);border-color:var(--border2);background:var(--bg4)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{color:var(--text);background:var(--bg3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.btn-danger:hover{background:rgba(184,84,84,0.2)}
.btn-ai{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.btn-ai:hover{background:rgba(139,92,246,0.2)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-lg{padding:11px 22px;font-size:14px}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn svg{width:14px;height:14px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem}
.card-sm{padding:1rem}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.stat-value{font-family:var(--font-display);font-size:28px;font-weight:500;color:var(--text);line-height:1}
.stat-sub{font-size:12px;color:var(--text3);margin-top:6px}
.stat-gold .stat-value{color:var(--gold)}

/* ── DEAL CARDS ── */
.deals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
.deal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.deal-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border2);transition:background 0.2s}
.deal-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.deal-card:hover::before{background:var(--gold)}
.deal-card.rag-green::before{background:var(--green)}
.deal-card.rag-amber::before{background:var(--amber)}
.deal-card.rag-red::before{background:var(--red)}
.deal-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.deal-name{font-family:var(--font-display);font-size:15px;font-weight:500;color:var(--text);line-height:1.3}
.deal-ref{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--font-mono)}
.deal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;letter-spacing:0.02em}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-gold{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border)}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.badge-grey{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.deal-meta{display:flex;gap:1rem;font-size:12px;color:var(--text3)}
.deal-progress{margin-top:12px}
.progress-bar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.4s ease}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab{padding:10px 18px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── FORMS ── */
.form-group{margin-bottom:1.25rem}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:0.02em}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13.5px;font-family:var(--font-sans);transition:border-color 0.15s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-select{cursor:pointer}
.form-select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:10px 14px;text-align:left;font-size:11px;color:var(--text3);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13.5px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-xl);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-lg{max-width:800px}
.modal-header{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--text)}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--bg2);position:sticky;bottom:0}
.close-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:color 0.15s}
.close-btn:hover{color:var(--text)}

/* ── CHECKLIST ── */
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);transition:opacity 0.2s}
.checklist-item:last-child{border-bottom:none}
.checklist-item.completed{opacity:0.5}
.checklist-cb{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s}
.checklist-cb.checked{background:var(--gold);border-color:var(--gold)}
.checklist-cb svg{display:none;width:10px;height:10px;color:#0F0F0E}
.checklist-cb.checked svg{display:block}
.checklist-content{flex:1;min-width:0}
.checklist-milestone{font-size:13.5px;color:var(--text)}
.checklist-item.completed .checklist-milestone{text-decoration:line-through;color:var(--text3)}
.checklist-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:10px}
.category-group{margin-bottom:1.5rem}
.category-header{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:6px 0;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}

/* ── AI TAB ── */
.ai-section{margin-bottom:2rem}
.ai-section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.ai-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg3)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--gold);background:var(--gold-bg)}
.upload-zone-icon{width:40px;height:40px;margin:0 auto 12px;color:var(--text3)}
.upload-zone p{color:var(--text2);font-size:13.5px;margin-bottom:6px}
.upload-zone small{color:var(--text3);font-size:12px}
.upload-zone input[type=file]{display:none}
.ai-status{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-top:1rem}
.ai-status-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ai-status-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.ai-status-dot.processing{background:var(--amber);animation:pulse 1s infinite}
.ai-status-dot.done{background:var(--green)}
.ai-status-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.ai-status-label{font-size:13px;font-weight:500;color:var(--text)}
.ai-status-log{font-family:var(--font-mono);font-size:11px;color:var(--text3);line-height:1.8;max-height:120px;overflow-y:auto}
.extracted-field{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.extracted-field:last-child{border-bottom:none}
.extracted-key{font-size:12px;color:var(--text3);width:160px;flex-shrink:0;padding-top:1px}
.extracted-value{font-size:13.5px;color:var(--text);flex:1}
.extracted-value.empty{color:var(--text3);font-style:italic}
.generated-doc{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.generated-doc-info{display:flex;align-items:center;gap:10px}
.generated-doc-icon{width:32px;height:32px;border-radius:6px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;color:var(--blue)}
.generated-doc-name{font-size:13.5px;color:var(--text);font-weight:500}
.generated-doc-meta{font-size:11px;color:var(--text3);margin-top:2px}

/* ── MISC ── */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty-state svg{width:48px;height:48px;margin:0 auto 1rem;opacity:0.3}
.empty-state h3{font-family:var(--font-display);font-size:18px;color:var(--text2);margin-bottom:8px}
.empty-state p{font-size:13.5px;line-height:1.6}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.section-title{font-family:var(--font-display);font-size:20px;font-weight:500;color:var(--text)}
.divider{height:1px;background:var(--border);margin:1.5rem 0}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.tooltip{position:relative}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}

/* ── NOTIFICATION ── */
.notif{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:12px 16px;font-size:13.5px;color:var(--text);z-index:999;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;max-width:360px;transform:translateY(100px);opacity:0;transition:all 0.3s ease}
.notif.show{transform:translateY(0);opacity:1}
.notif.success .notif-icon{color:var(--green)}
.notif.error .notif-icon{color:var(--red)}
.notif.info .notif-icon{color:var(--blue)}

/* ── LOADING ── */
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* CONFIG PAGE */
.config-card{max-width:560px;margin:0 auto}
.config-key-display{font-family:var(--font-mono);font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text3);word-break:break-all}

/* DEAL DETAIL */
.deal-detail-header{margin-bottom:2rem}
.deal-detail-name{font-family:var(--font-display);font-size:26px;font-weight:500;color:var(--text);margin-bottom:8px}
.deal-detail-meta{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}

/* PARTY TABLE */
.party-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.party-row:last-child{border-bottom:none}

/* SIGNATURE TRACKER */
.sig-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.sig-item:last-child{border-bottom:none}
.sig-status-pending{color:var(--amber)}
.sig-status-signed{color:var(--green)}

/* CLOSING BOOK */
.closing-section{margin-bottom:1rem}
.closing-section-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* ACTIVITY LOG */
.activity-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:5px}
.activity-content{flex:1}
.activity-text{font-size:13.5px;color:var(--text2)}
.activity-time{font-size:11px;color:var(--text3);margin-top:3px}

/* SELLER TABLE in HOT */
.seller-table-input{width:100%;background:transparent;border:none;color:var(--text);font-size:13px;padding:4px;outline:none}
.seller-table-input:focus{background:var(--bg3);border-radius:4px}

/* HIGHLIGHT on auto-fill */
@keyframes highlightFade{0%{background:rgba(201,168,76,0.2)}100%{background:transparent}}
.auto-filled{animation:highlightFade 2s ease forwards}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1>M&A Hub</h1>
    <p>Transaction Management</p>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-label">Overview</div>
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="nav-item" onclick="navigate('pipeline')" id="nav-pipeline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Pipeline
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Settings</div>
      <div class="nav-item" onclick="navigate('config')" id="nav-config">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Configuration
      </div>
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <strong id="sidebar-username">M&A Hub</strong>
      <span id="sidebar-firm">Not configured</span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-actions" id="topbar-actions">
      <button class="btn btn-primary" onclick="openNewDeal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Deal
      </button>
    </div>
  </div>
  <div class="content" id="content"></div>
</main>

<!-- NOTIFICATION -->
<div class="notif" id="notif">
  <svg class="notif-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="notif-text"></span>
</div>

<!-- MODALS -->
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════════════════
let config = {
  supabaseUrl: '', supabaseKey: '', anthropicKey: '', userName: '', firmName: ''
};
let currentView = 'dashboard';
let currentDeal = null;
let currentDealTab = 'overview';
let deals = [];
let uploadedHOTFile = null;
let uploadedSPAFile = null;
let extractedHOTData = null;

function loadConfig() {
  const saved = localStorage.getItem('mahub_config');
  if (saved) { config = { ...config, ...JSON.parse(saved) }; }
  updateSidebarUser();
}
function saveConfig() {
  localStorage.setItem('mahub_config', JSON.stringify(config));
  updateSidebarUser();
}
function updateSidebarUser() {
  document.getElementById('sidebar-username').textContent = config.userName || 'M&A Hub';
  document.getElementById('sidebar-firm').textContent = config.firmName || 'Not configured';
}

// ═══════════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════════
async function sbFetch(path, opts = {}) {
  if (!config.supabaseUrl || !config.supabaseKey) throw new Error('Supabase not configured');
  const url = `${config.supabaseUrl}/rest/v1/${path}`;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'apikey': config.supabaseKey,
      'Authorization': `Bearer ${config.supabaseKey}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || res.statusText); }
  if (res.status === 204) return null;
  return res.json();
}

async function loadDeals() {
  try {
    const data = await sbFetch('deals?select=*&order=created_at.desc&status=eq.Active');
    deals = data || [];
    return deals;
  } catch(e) { console.error(e); return []; }
}

async function saveDeal(deal) {
  if (deal.id) {
    const { id, created_at, ...rest } = deal;
    return sbFetch(`deals?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(rest) });
  } else {
    return sbFetch('deals', { method: 'POST', body: JSON.stringify(deal), prefer: 'return=representation' });
  }
}

async function loadChecklist(dealId) {
  return sbFetch(`checklist_items?deal_id=eq.${dealId}&order=order_index.asc`);
}
async function saveChecklistItem(item) {
  if (item.id) {
    const { id, ...rest } = item;
    return sbFetch(`checklist_items?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(rest) });
  } else {
    return sbFetch('checklist_items', { method: 'POST', body: JSON.stringify(item) });
  }
}
async function loadDocuments(dealId) {
  return sbFetch(`documents?deal_id=eq.${dealId}&order=created_at.desc`);
}
async function saveDocument(doc) {
  return sbFetch('documents', { method: 'POST', body: JSON.stringify(doc) });
}
async function loadParties(dealId) {
  return sbFetch(`parties?deal_id=eq.${dealId}&order=role.asc`);
}
async function saveParty(party) {
  if (party.id) {
    const { id, ...rest } = party;
    return sbFetch(`parties?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(rest) });
  }
  return sbFetch('parties', { method: 'POST', body: JSON.stringify(party) });
}
async function deleteParty(id) {
  return sbFetch(`parties?id=eq.${id}`, { method: 'DELETE' });
}
async function loadSignatures(dealId) {
  return sbFetch(`signatures?deal_id=eq.${dealId}&order=created_at.asc`) || [];
}
async function loadActivityLog(dealId) {
  return sbFetch(`activity_log?deal_id=eq.${dealId}&order=created_at.desc&limit=30`) || [];
}
async function logActivity(dealId, text) {
  try {
    await sbFetch('activity_log', { method: 'POST', body: JSON.stringify({ deal_id: dealId, action: text, detail: config.userName || 'User' }) });
  } catch(e) {}
}
async function loadCriticalDates(dealId) {
  return sbFetch(`critical_dates?deal_id=eq.${dealId}&order=expected_date.asc`) || [];
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
function navigate(view, data = null) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${view}`);
  if (navEl) navEl.classList.add('active');

  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = '';

  if (view === 'dashboard') {
    document.getElementById('topbar-title').textContent = 'Dashboard';
    actions.innerHTML = `<button class="btn btn-primary" onclick="openNewDeal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Deal</button>`;
    renderDashboard();
  } else if (view === 'pipeline') {
    document.getElementById('topbar-title').textContent = 'Pipeline';
    actions.innerHTML = `<button class="btn btn-primary" onclick="openNewDeal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Deal</button>`;
    renderPipeline();
  } else if (view === 'deal') {
    currentDeal = data;
    renderDealDetail(data);
  } else if (view === 'config') {
    document.getElementById('topbar-title').textContent = 'Configuration';
    renderConfig();
  }
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
async function renderDashboard() {
  document.getElementById('content').innerHTML = `<div style="text-align:center;padding:3rem"><div class="spinner"></div></div>`;
  await loadDeals();
  const active = deals.filter(d => d.status === 'Active').length;
  const completing = deals.filter(d => d.stage === 'Completing').length;
  const totalValue = deals.reduce((s, d) => s + (parseFloat(d.deal_value) || 0), 0);
  const redDeals = deals.filter(d => d.rag_status === 'Red').length;

  document.getElementById('content').innerHTML = `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Active Deals</div><div class="stat-value stat-gold">${active}</div><div class="stat-sub">Across all stages</div></div>
    <div class="stat-card"><div class="stat-label">Completing</div><div class="stat-value">${completing}</div><div class="stat-sub">Near completion</div></div>
    <div class="stat-card"><div class="stat-label">Total Value</div><div class="stat-value">${formatCurrency(totalValue)}</div><div class="stat-sub">Active portfolio</div></div>
    <div class="stat-card"><div class="stat-label">Needs Attention</div><div class="stat-value" style="color:var(--red)">${redDeals}</div><div class="stat-sub">RAG red status</div></div>
  </div>
  <div class="section-header">
    <div class="section-title">Active Deals</div>
    <div style="display:flex;gap:8px">
      <input class="form-input" style="width:220px" placeholder="Search deals…" oninput="filterDeals(this.value)" id="deal-search">
    </div>
  </div>
  ${deals.length === 0 ? `
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><briefcase/><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      <h3>No deals yet</h3>
      <p>Click New Deal to create your first transaction</p>
    </div>
  ` : `<div class="deals-grid" id="deals-grid">${deals.map(renderDealCard).join('')}</div>`}
  `;
}

function filterDeals(q) {
  const filtered = deals.filter(d =>
    d.deal_name?.toLowerCase().includes(q.toLowerCase()) ||
    d.client_name?.toLowerCase().includes(q.toLowerCase()) ||
    d.matter_ref?.toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('deals-grid').innerHTML = filtered.map(renderDealCard).join('');
}

function renderDealCard(d) {
  const rag = (d.rag_status || 'Green').toLowerCase();
  const progress = d.progress || 0;
  return `
  <div class="deal-card rag-${rag}" onclick="navigate('deal', ${JSON.stringify(d).replace(/"/g, '&quot;')})">
    <div class="deal-card-header">
      <div>
        <div class="deal-name">${d.deal_name || 'Untitled Deal'}</div>
        <div class="deal-ref">${d.matter_ref || '—'}</div>
      </div>
      <span class="badge badge-${rag === 'green' ? 'green' : rag === 'amber' ? 'amber' : 'red'}">${d.rag_status || 'Green'}</span>
    </div>
    <div class="deal-badges">
      <span class="badge badge-grey">${d.transaction_type || 'SPA'}</span>
      <span class="badge badge-blue">${d.client_role || 'Buyer'}</span>
      ${d.stage ? `<span class="badge badge-gold">${d.stage}</span>` : ''}
    </div>
    <div class="deal-meta">
      <span>${d.client_name || '—'}</span>
      ${d.deal_value ? `<span>£${Number(d.deal_value).toLocaleString()}</span>` : ''}
      ${d.target_completion ? `<span>⟶ ${formatDate(d.target_completion)}</span>` : ''}
    </div>
    <div class="deal-progress">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="progress-label"><span>${d.stage || 'Pre-HOT'}</span><span>${progress}%</span></div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// PIPELINE VIEW
// ═══════════════════════════════════════════════════════
async function renderPipeline() {
  await loadDeals();
  const stages = ['Pre-HOT','HOT Agreed','Due Diligence','SPA Drafting','SPA Agreed','Completing','Completed'];
  document.getElementById('content').innerHTML = `
  <div style="overflow-x:auto">
    <div style="display:grid;grid-template-columns:repeat(${stages.length},220px);gap:12px;min-width:${stages.length*232}px">
      ${stages.map(stage => {
        const stageDeals = deals.filter(d => (d.stage || 'Pre-HOT') === stage);
        return `
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;display:flex;justify-content:space-between">
            <span>${stage}</span><span class="badge badge-grey">${stageDeals.length}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${stageDeals.map(d => `
            <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;cursor:pointer;border-left:3px solid var(--${(d.rag_status||'Green').toLowerCase()==='green'?'green':(d.rag_status||'').toLowerCase()==='red'?'red':'amber'})" onclick="navigate('deal', ${JSON.stringify(d).replace(/"/g, '&quot;')})">
              <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px">${d.deal_name}</div>
              <div style="font-size:11px;color:var(--text3)">${d.client_name || '—'}</div>
              ${d.deal_value ? `<div style="font-size:12px;color:var(--gold);margin-top:6px">£${Number(d.deal_value).toLocaleString()}</div>` : ''}
            </div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// DEAL DETAIL
// ═══════════════════════════════════════════════════════
function renderDealDetail(deal) {
  const d = deal;
  document.getElementById('topbar-title').innerHTML = `<span style="color:var(--text3);cursor:pointer;font-size:14px" onclick="navigate('dashboard')">← Deals</span>`;
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="openEditDeal(currentDeal)">Edit Deal</button>
    <button class="btn btn-danger btn-sm" onclick="archiveDeal('${d.id}')">Archive</button>`;

  window._dealTabs = ['Overview','Parties','Checklist','Documents','Signatures','AI','CriticalDates','Activity'];
  window._dealTabLabels = {'Overview':'Overview','Parties':'Parties','Checklist':'Checklist','Documents':'Documents','Signatures':'Signatures','AI':'AI & Documents','CriticalDates':'Critical Dates','Activity':'Activity'};
  document.getElementById('content').innerHTML = `
  <div class="deal-detail-header">
    <div class="deal-detail-name">${d.deal_name}</div>
    <div class="deal-detail-meta">
      ${d.matter_ref ? `<span class="tag" style="font-family:var(--font-mono)">${d.matter_ref}</span>` : ''}
      <span class="badge badge-${(d.rag_status||'Green').toLowerCase()==='green'?'green':(d.rag_status||'').toLowerCase()==='red'?'red':'amber'}">${d.rag_status||'Green'}</span>
      <span class="badge badge-blue">${d.client_role||'Buyer'}</span>
      ${d.stage ? `<span class="badge badge-gold">${d.stage}</span>` : ''}
    </div>
  </div>
  <div class="tabs" id="deal-tabs">
    ${window._dealTabs.map((t,i) => '<div class="tab' + (t==='Overview'?' active':'') + '" onclick="switchDealTab(window._dealTabs[' + i + '],this)">' + window._dealTabLabels[t] + '</div>').join('')}
  </div>
  <div id="deal-tab-content"></div>`;

  switchDealTab('Overview');
}

async function switchDealTab(tab, el) {
  currentDealTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    document.querySelectorAll('.tab').forEach((t,i) => { if (window._dealTabs && window._dealTabs[i] === tab) t.classList.add('active'); });
  }

  const c = document.getElementById('deal-tab-content');
  const d = currentDeal;

  if (tab === 'Overview') {
    c.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
      <div class="card">
        <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1rem">Transaction Details</div>
        ${fieldRow('Matter Ref', d.matter_ref, 'mono')}
        ${fieldRow('Deal Name', d.deal_name)}
        ${fieldRow('Transaction Type', d.transaction_type)}
        ${fieldRow('Client', d.client_name)}
        ${fieldRow('Client Role', d.client_role)}
        ${fieldRow('Counterparty', d.counterparty)}
        ${fieldRow('Counterparty Solicitors', d.counterparty_solicitors)}
      </div>
      <div class="card">
        <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1rem">Financial & Timeline</div>
        ${fieldRow('Deal Value', d.deal_value ? '£' + Number(d.deal_value).toLocaleString() : null)}
        ${fieldRow('Target Completion', d.target_completion ? formatDate(d.target_completion) : null)}
        ${fieldRow('Stage', d.stage)}
        ${fieldRow('RAG Status', d.rag_status)}
        ${fieldRow('Priority', d.priority)}
        ${fieldRow('Next Action', d.next_action)}
      </div>
      ${d.notes ? `<div class="card" style="grid-column:1/-1"><div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Notes</div><div style="font-size:13.5px;color:var(--text2);line-height:1.6">${d.notes}</div></div>` : ''}
    </div>`;
  }

  else if (tab === 'Parties') {
    const parties = await loadParties(d.id);
    c.innerHTML = `
    <div class="section-header"><div class="section-title" style="font-size:16px">Parties & Contacts</div>
    <button class="btn btn-secondary btn-sm" onclick="openAddParty()">+ Add Party</button></div>
    <div class="card" id="parties-list">
    ${parties && parties.length ? `
      <div class="party-row" style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding-bottom:8px">
        <span>Name</span><span>Role</span><span>Firm / Contact</span><span></span>
      </div>
      ${parties.map(p => `
      <div class="party-row">
        <div style="font-size:13.5px;color:var(--text)">${p.name||'—'}</div>
        <div><span class="badge badge-grey">${p.role||'—'}</span></div>
        <div style="font-size:12px;color:var(--text3)">${p.firm||''} ${p.email ? `<br>${p.email}` : ''}</div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="deletePartyRow('${p.id}')">✕</button>
        </div>
      </div>`).join('')}
    ` : `<div class="empty-state" style="padding:2rem"><p>No parties added yet</p></div>`}
    </div>`;
  }

  else if (tab === 'Checklist') {
    const items = await loadChecklist(d.id);
    c.innerHTML = `
    <div class="section-header">
      <div class="section-title" style="font-size:16px">Deal Checklist</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="loadChecklistTemplate('buyer')">Load Buyer Template</button>
        <button class="btn btn-secondary btn-sm" onclick="loadChecklistTemplate('seller')">Load Seller Template</button>
        <button class="btn btn-secondary btn-sm" onclick="openAddChecklistItem()">+ Add Item</button>
      </div>
    </div>
    ${renderChecklist(items || [])}`;
  }

  else if (tab === 'Documents') {
    let docs = [];
    try { docs = await loadDocuments(d.id) || []; } catch(e) { docs = []; }
    c.innerHTML = `
    <div class="section-header">
      <div class="section-title" style="font-size:16px">Document Register</div>
      <button class="btn btn-secondary btn-sm" onclick="openAddDocument()">+ Add Document</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Document</th><th>Type</th><th>Version</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>
        ${docs && docs.length ? docs.map(doc => `
          <tr>
            <td style="color:var(--text)">${doc.name||'—'}</td>
            <td><span class="badge badge-grey">${doc.type||'—'}</span></td>
            <td style="font-family:var(--font-mono);font-size:12px">${doc.version||'—'}</td>
            <td><span class="badge badge-${doc.status==='Final'?'green':doc.status==='Agreed'?'blue':'amber'}">${doc.status||'Draft'}</span></td>
            <td style="color:var(--text3)">${doc.date ? formatDate(doc.date) : '—'}</td>
          </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:2rem">No documents logged</td></tr>'}
        </tbody>
      </table>
    </div>`;
  }

  else if (tab === 'Signatures') {
    let sigs = [];
    try { sigs = await loadSignatures(d.id) || []; } catch(e) { sigs = []; }
    c.innerHTML = `
    <div class="section-header">
      <div class="section-title" style="font-size:16px">Signature Tracker</div>
      <button class="btn btn-secondary btn-sm" onclick="openAddSignature()">+ Add Signatory</button>
    </div>
    <div class="card">
    ${sigs && sigs.length ? sigs.map(s => `
      <div class="sig-item">
        <div>
          <div style="font-size:13.5px;color:var(--text)">${s.signatory_name||'—'}</div>
          <div style="font-size:12px;color:var(--text3)">${s.document_name||'—'} · ${s.party||'—'}</div>
        </div>
        <span class="badge badge-amber">Pending</span>
      </div>`).join('') : '<div class="empty-state" style="padding:2rem"><p>No signatories tracked</p></div>'}
    </div>`;
  }

  else if (tab === 'AI') {
    renderAITab();
  }

  else if (tab === 'CriticalDates') {
    let dates = [];
    try { dates = await loadCriticalDates(d.id) || []; } catch(e) { dates = []; }
    c.innerHTML = `
    <div class="section-header">
      <div class="section-title" style="font-size:16px">Critical Dates</div>
      <button class="btn btn-secondary btn-sm" onclick="openAddDate()">+ Add Date</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Milestone</th><th>Expected Date</th><th>Status</th><th>Actual Date</th></tr></thead>
        <tbody>
        ${dates && dates.length ? dates.map(dt => `
          <tr>
            <td style="color:var(--text)">${dt.milestone||'—'}</td>
            <td style="color:var(--gold)">${dt.expected_date ? formatDate(dt.expected_date) : '—'}</td>
            <td><span class="badge badge-${dt.status==='Done'?'green':'amber'}">${dt.status||'Pending'}</span></td>
            <td style="color:var(--text3)">${dt.actual_date ? formatDate(dt.actual_date) : '—'}</td>
          </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:2rem">No critical dates added</td></tr>'}
        </tbody>
      </table>
    </div>`;
  }

  else if (tab === 'Activity') {
    let log = [];
    try { log = await loadActivityLog(d.id) || []; } catch(e) { log = []; }
    c.innerHTML = `
    <div class="section-title" style="font-size:16px;margin-bottom:1.5rem">Activity Log</div>
    <div class="card">
    ${log && log.length ? log.map(a => `
      <div class="activity-item">
        <div class="activity-dot"></div>
        <div class="activity-content">
          <div class="activity-text">${a.action||'—'}${a.detail ? ' — ' + a.detail : ''}</div>
          <div class="activity-time">${a.created_at ? new Date(a.created_at).toLocaleString('en-GB') : '—'}</div>
        </div>
      </div>`).join('') : '<div class="empty-state" style="padding:2rem"><p>No activity logged</p></div>'}
    </div>`;
  }
}

// ═══════════════════════════════════════════════════════
// AI & DOCUMENTS TAB
// ═══════════════════════════════════════════════════════
function renderAITab() {
  const c = document.getElementById('deal-tab-content');
  const hotStatus = extractedHOTData ? 'done' : 'idle';

  c.innerHTML = `
  <div style="max-width:760px">

    <!-- PHASE 2A: HOT UPLOAD -->
    <div class="ai-section">
      <div class="ai-section-title">Phase 2A — Heads of Terms</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:1rem;line-height:1.6">Upload your signed HOT. Claude will extract all key deal information and auto-populate the deal record.</div>

      <div class="upload-zone" id="hot-upload-zone" onclick="document.getElementById('hot-file-input').click()" 
           ondragover="handleDragOver(event,'hot-upload-zone')" ondragleave="handleDragLeave(event,'hot-upload-zone')" ondrop="handleDrop(event,'hot')">
        <input type="file" id="hot-file-input" accept=".docx,.doc,.pdf" onchange="handleHOTFile(event)">
        <div class="upload-zone-icon">

function renderExtractedData(data) {
  const fields = [
    ['Target Company', data.targetCompany],
    ['Target Company No.', data.targetCompanyNumber],
    ['Buyer', data.buyerName],
    ['Buyer Type', data.buyerType],
    ['Seller(s)', Array.isArray(data.sellers) ? data.sellers.map(s => `${s.name} (${s.shares} shares, ${s.percentage}%)`).join('; ') : data.sellers],
    ['Purchase Price', data.purchasePrice],
    ['Consideration Structure', data.considerationStructure],
    ['Target Completion', data.targetCompletion],
    ['Conditions Precedent', Array.isArray(data.conditionsPrecedent) ? data.conditionsPrecedent.join('; ') : data.conditionsPrecedent],
    ['Exclusivity Period', data.exclusivityPeriod],
    ['Warranty Cap', data.warrantyCap],
    ['Non-Compete Period', data.nonCompetePeriod],
    ['Resigning Directors', Array.isArray(data.resigningDirectors) ? data.resigningDirectors.join(', ') : data.resigningDirectors],

  return `

    </div>`).join('')}

}

// ── HOT FILE HANDLING ──
function handleHOTFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  uploadedHOTFile = file;
  document.getElementById('hot-upload-label').textContent = file.name;
  renderAITab();
}

function clearHOT() {
  uploadedHOTFile = null;
  extractedHOTData = null;
  renderAITab();
}

function handleSPAFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  uploadedSPAFile = file;
  document.getElementById('spa-upload-label').textContent = file.name;
  renderAITab();
}

function clearSPA() {
  uploadedSPAFile = null;
  renderAITab();
}

function handleDragOver(e, zoneId) {
  e.preventDefault();
  document.getElementById(zoneId).classList.add('dragover');
}
function handleDragLeave(e, zoneId) {
  document.getElementById(zoneId).classList.remove('dragover');
}
function handleDrop(e, type) {
  e.preventDefault();
  const zoneId = type === 'hot' ? 'hot-upload-zone' : 'spa-upload-zone';
  document.getElementById(zoneId).classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (type === 'hot') { uploadedHOTFile = file; renderAITab(); }
  else { uploadedSPAFile = file; renderAITab(); }
}

// ── HOT EXTRACTION ──
async function runHOTExtraction() {
  if (!uploadedHOTFile) return;
  if (!config.anthropicKey) { showNotif('Please set your Anthropic API key in Configuration', 'error'); return; }

  const btn = document.getElementById('hot-extract-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px"></div> Extracting…';

  const statusArea = document.getElementById('hot-status-area');
  statusArea.innerHTML = `
  <div class="ai-status" style="margin-top:1rem">
    <div class="ai-status-header">
      <div class="ai-status-dot processing"></div>
      <div class="ai-status-label">Reading document…</div>
    </div>
    <div class="ai-status-log" id="hot-log">Reading file…</div>
  </div>`;

  const log = (msg) => {
    const el = document.getElementById('hot-log');
    if (el) el.innerHTML += `\n${msg}`;
  };

  try {
    log('Converting to base64…');
    const base64 = await fileToBase64(uploadedHOTFile);
    const mediaType = uploadedHOTFile.name.endsWith('.pdf') ? 'application/pdf' : 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';

    log('Sending to Claude…');

    const prompt = `You are a corporate solicitor's assistant. Carefully read this Heads of Terms document and extract the following information. Return ONLY a valid JSON object with these exact keys:

{
  "targetCompany": "full company name",
  "targetCompanyNumber": "company registration number if mentioned",
  "buyerName": "buyer full name or company name",
  "buyerType": "Company or Individual",
  "sellers": [{"name": "seller name", "shares": "number of shares", "percentage": "percentage", "shareClass": "share class"}],
  "purchasePrice": "full price as stated e.g. £500,000",
  "considerationStructure": "Cash only / Cash + Deferred / Cash + Earnout etc",
  "deferredPayment": "details if any deferred consideration",
  "targetCompletion": "completion date or period as stated",
  "exclusivityPeriod": "exclusivity period if stated",
  "conditionsPrecedent": ["list each condition"],
  "warrantyCap": "cap amount if stated",
  "warrantyPeriod": "warranty period if stated",
  "nonCompetePeriod": "non-compete period in months",
  "resigningDirectors": ["list of directors resigning"],
  "buyerSolicitors": "buyer's solicitors firm name if mentioned",
  "sellerSolicitors": "seller's solicitors firm name if mentioned",
  "governingLaw": "governing law jurisdiction",
  "targetBusinessDescription": "brief description of target's business if stated"
}

If any field is not found in the document, use null. Return ONLY the JSON, no other text.`;

    const requestBody = {
      model: 'claude-sonnet-4-6',
      max_tokens: 2000,
      messages: [{
        role: 'user',
        content: [
          {
            type: mediaType === 'application/pdf' ? 'document' : 'document',
            source: {
              type: 'base64',
              media_type: mediaType,
              data: base64
            }
          },
          { type: 'text', text: prompt }
        ]
      }]
    };

    // For docx we send as text after basic extraction
    let responseText;
    if (!uploadedHOTFile.name.endsWith('.pdf')) {
      log('Processing Word document…');
      // Read as text for docx - send content directly
      const textContent = await readDocxAsText(uploadedHOTFile);
      log('Text extracted, sending to Claude…');

      const textRequestBody = {
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: `${prompt}\n\nHEADS OF TERMS DOCUMENT CONTENT:\n\n${textContent}`
        }]
      };

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': config.anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify(textRequestBody)
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'API error');
      }
      const data = await response.json();
      responseText = data.content[0].text;
    } else {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': config.anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify(requestBody)
      });
      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'API error');
      }
      const data = await response.json();
      responseText = data.content[0].text;
    }

    log('Parsing response…');
    const cleaned = responseText.replace(/```json\n?|\n?```/g, '').trim();
    const parsed = JSON.parse(cleaned);

    extractedHOTData = parsed;
    log('Done.');

    statusArea.innerHTML = `
    <div class="ai-status" style="margin-top:1rem;border-color:var(--green-border)">
      <div class="ai-status-header">
        <div class="ai-status-dot done"></div>
        <div class="ai-status-label" style="color:var(--green)">Extraction complete</div>
      </div>
    </div>`;

    renderAITab();
    await logActivity(currentDeal.id, `HOT uploaded and extracted: ${uploadedHOTFile.name}`);
    showNotif('HOT extracted successfully', 'success');

  } catch(err) {
    statusArea.innerHTML = `
    <div class="ai-status" style="margin-top:1rem;border-color:var(--red-border)">
      <div class="ai-status-header">
        <div class="ai-status-dot error"></div>
        <div class="ai-status-label" style="color:var(--red)">Error: ${err.message}</div>
      </div>
    </div>`;
    showNotif('Extraction failed: ' + err.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Extract with Claude`; }
  }
}

// ── APPLY HOT DATA TO DEAL ──
async function applyHOTToDeal() {
  if (!extractedHOTData) return;
  const d = extractedHOTData;

  const updates = {};
  if (d.targetCompany && !currentDeal.deal_name?.includes(d.targetCompany)) {
    if (!currentDeal.deal_name || currentDeal.deal_name === 'Untitled Deal') {
      updates.deal_name = `Acquisition of ${d.targetCompany}`;
    }
  }
  if (d.buyerName) updates.counterparty = d.buyerType === 'Company' && currentDeal.client_role === 'Seller' ? d.buyerName : updates.counterparty;
  if (d.purchasePrice) {
    const num = parseFloat(d.purchasePrice.replace(/[£,]/g, ''));
    if (!isNaN(num)) updates.deal_value = num;
  }
  if (d.targetCompletion) updates.target_completion = parseTargetDate(d.targetCompletion);
  if (d.governingLaw) updates.notes = (currentDeal.notes ? currentDeal.notes + '\n' : '') + `Governing law: ${d.governingLaw}`;
  if (d.nonCompetePeriod) updates.notes = ((updates.notes || currentDeal.notes || '') + `\nNon-compete: ${d.nonCompetePeriod} months`).trim();
  if (!currentDeal.stage || currentDeal.stage === 'Pre-HOT') updates.stage = 'HOT Agreed';

  try {
    await saveDeal({ ...currentDeal, ...updates });
    currentDeal = { ...currentDeal, ...updates };

    // Add sellers as parties
    if (d.sellers && d.sellers.length) {
      for (const seller of d.sellers) {
        if (seller.name) {
          await saveParty({ deal_id: currentDeal.id, name: seller.name, role: 'Seller', firm: '', email: '' });
        }
      }
    }
    if (d.buyerName) {
      await saveParty({ deal_id: currentDeal.id, name: d.buyerName, role: 'Buyer', firm: d.buyerSolicitors || '', email: '' });
    }
    if (d.targetCompany) {
      await saveParty({ deal_id: currentDeal.id, name: d.targetCompany, role: 'Target', firm: '', email: '' });
    }

    await logActivity(currentDeal.id, `Deal record auto-populated from HOT by ${config.userName || 'User'}`);

    // Highlight updated fields
    showNotif('Deal record updated from HOT', 'success');
    renderAITab();
  } catch(err) {
    showNotif('Failed to update deal: ' + err.message, 'error');
  }
}

async function runSPAExtraction() {
  if (!uploadedSPAFile) return;

  const btn = document.getElementById('spa-extract-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px"></div> Processing…';

  const statusArea = document.getElementById('spa-status-area');
  statusArea.innerHTML = `
  <div class="ai-status" style="margin-top:1rem">
    <div class="ai-status-header"><div class="ai-status-dot processing"></div><div class="ai-status-label">Reading SPA…</div></div>
    <div class="ai-status-log" id="spa-log">Starting…</div>
  </div>`;

  const log = (msg) => { const el = document.getElementById('spa-log'); if (el) el.innerHTML += `\n${msg}`; };

  try {
    log('Extracting text from document…');
    const textContent = uploadedSPAFile.name.endsWith('.pdf')
      ? 'PDF detected — text extraction in progress'
      : await readDocxAsText(uploadedSPAFile);

    log('Sending to Claude for SPA analysis…');

    const spaPrompt = `You are a corporate solicitor's assistant. Read this Share Purchase Agreement and extract key details. Return ONLY a valid JSON object:

{
  "targetCompany": "target company name",
  "targetCompanyNumber": "company registration number",
  "targetDirectors": [{"name": "director name", "resigning": true/false, "incoming": true/false}],
  "targetSoleDirector": true/false,
  "targetNewRegisteredOffice": "new registered office address if stated",
  "buyerName": "buyer name",
  "buyerType": "Company or Individual",
  "buyerCompanyNumber": "buyer company number if company",
  "buyerDirectors": ["list of buyer directors signing"],
  "buyerSoleDirector": true/false,
  "sellers": [{"name": "seller name", "shares": "number", "shareClass": "class", "percentage": "percentage"}],
  "sellerType": "Company or Individual or Multiple",
  "sellerDirectors": ["seller company directors if applicable"],
  "sellerSoleDirector": true/false,
  "purchasePrice": "£amount",
  "completionDate": "date",
  "shareClass": "ordinary etc",
  "nominalValue": "nominal value per share",
  "totalShares": "total shares being transferred",
  "newDirectors": ["names of incoming directors"],
  "companySecretaryChanges": "details if any",
  "pscChanges": "details of PSC changes",
  "serviceAgreements": ["parties to service agreements"],
  "settlementAgreements": ["parties to settlement agreements"]
}

Return ONLY the JSON.

SPA CONTENT:
${textContent.substring(0, 15000)}`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': config.anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 2000, messages: [{ role: 'user', content: spaPrompt }] })
    });

    if (!response.ok) { const e = await response.json(); throw new Error(e.error?.message || 'API error'); }
    const data = await response.json();
    const parsed = JSON.parse(data.content[0].text.replace(/```json\n?|\n?```/g, '').trim());

    log('SPA analysed. Generating board resolutions…');

    // Determine which board resolutions are needed
    const docsToGenerate = [];

    // Target — always needs one
    docsToGenerate.push({ type: 'target', soleDir: parsed.targetSoleDirector, data: parsed });

    // Buyer — only if company
    if (parsed.buyerType === 'Company') {
      docsToGenerate.push({ type: 'buyer', soleDir: parsed.buyerSoleDirector, data: parsed });
    }

    // Seller — only if company
    if (parsed.sellerType === 'Company') {
      docsToGenerate.push({ type: 'seller', soleDir: parsed.sellerSoleDirector, data: parsed });
    }

    log(`Generating ${docsToGenerate.length} board resolution(s)…`);

    const generatedDocs = [];
    for (const docSpec of docsToGenerate) {
      log(`Generating ${docSpec.type} board resolution (${docSpec.soleDir ? 'sole director' : 'multiple directors'})…`);
      const docContent = await generateBoardRes(docSpec, config.anthropicKey);
      generatedDocs.push({ type: docSpec.type, soleDir: docSpec.soleDir, content: docContent, name: `${capitalize(docSpec.type)} Board Resolution`, generated: new Date().toLocaleString('en-GB') });
      log(`✓ ${capitalize(docSpec.type)} board resolution generated`);
    }

    // Update deal record from SPA
    log('Updating deal record from SPA…');
    const spaUpdates = {};
    if (parsed.purchasePrice) { const n = parseFloat(parsed.purchasePrice.replace(/[£,]/g, '')); if (!isNaN(n)) spaUpdates.deal_value = n; }
    if (parsed.completionDate) spaUpdates.target_completion = parseTargetDate(parsed.completionDate);
    if (parsed.targetCompany && !currentDeal.deal_name?.includes(parsed.targetCompany)) spaUpdates.deal_name = `Acquisition of ${parsed.targetCompany}`;
    spaUpdates.stage = 'SPA Agreed';
    await saveDeal({ ...currentDeal, ...spaUpdates });
    currentDeal = { ...currentDeal, ...spaUpdates };

    await logActivity(currentDeal.id, `SPA uploaded and analysed. ${generatedDocs.length} board resolution(s) generated.`);

    statusArea.innerHTML = `
    <div class="ai-status" style="margin-top:1rem;border-color:var(--green-border)">
      <div class="ai-status-header"><div class="ai-status-dot done"></div><div class="ai-status-label" style="color:var(--green)">SPA processed — ${generatedDocs.length} document(s) generated</div></div>
    </div>`;

    // Show generated docs
    const genSection = document.getElementById('generated-docs-section');
    if (genSection) {
      genSection.style.display = '';
      document.getElementById('generated-docs-list').innerHTML = generatedDocs.map((doc, i) => `
      <div class="generated-doc">
        <div class="generated-doc-info">
          <div class="generated-doc-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div>
            <div class="generated-doc-name">${doc.name} — ${doc.soleDir ? 'Sole Director' : 'Board Meeting'}</div>
            <div class="generated-doc-meta">Generated ${doc.generated}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">

          <button class="btn btn-primary btn-sm" onclick="downloadDoc(${i})">Download</button>
        </div>
      </div>`).join('');

      // Store docs for download
      window._generatedDocs = generatedDocs;
    }

    showNotif(`SPA processed — ${generatedDocs.length} board resolution(s) ready`, 'success');

  } catch(err) {
    statusArea.innerHTML = `<div class="ai-status" style="margin-top:1rem;border-color:var(--red-border)"><div class="ai-status-header"><div class="ai-status-dot error"></div><div class="ai-status-label" style="color:var(--red)">Error: ${err.message}</div></div></div>`;
    showNotif('SPA processing failed: ' + err.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Update from SPA`; }
  }
}

// ── BOARD RESOLUTION GENERATOR ──
async function generateBoardRes(spec, apiKey) {
  const { type, soleDir, data } = spec;

  const targetName = data.targetCompany || '[TARGET COMPANY]';
  const buyerName = data.buyerName || '[BUYER]';
  const sellers = data.sellers?.map(s => s.name).join(', ') || '[SELLER]';
  const totalShares = data.totalShares || '[NUMBER]';
  const shareClass = data.shareClass || 'ordinary';
  const nominalValue = data.nominalValue || '£1.00';
  const completionDate = data.completionDate || '[COMPLETION DATE]';
  const newDirectors = data.newDirectors?.join(' and ') || '[NEW DIRECTORS]';
  const resigningDirs = data.targetDirectors?.filter(d => d.resigning).map(d => d.name).join(' and ') || '[OUTGOING DIRECTORS]';
  const newAddress = data.targetNewRegisteredOffice || '[NEW REGISTERED OFFICE]';
  const companyNumber = data.targetCompanyNumber || '[COMPANY NUMBER]';

  let templateInstructions = '';

  if (type === 'target' && soleDir) {
    templateInstructions = `Generate a written resolution of the sole director of ${targetName} (Company Number: ${companyNumber}) approving the sale of its entire issued share capital to ${buyerName}.

Use this EXACT format and style:

Company number: ${companyNumber}                    Date: ${completionDate}

${targetName} Limited
(the "Company")

Written resolutions of the sole director of the Company

Introduction and purpose of meeting

function downloadDoc(index) {
  const doc = window._generatedDocs?.[index];
  if (!doc) return;
  const blob = new Blob([doc.content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${doc.name.replace(/\s+/g, '_')}_${doc.soleDir ? 'Sole_Dir' : 'Board_Meeting'}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showNotif(`${doc.name} downloaded`, 'success');
}

// ── FILE UTILITIES ──
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function readDocxAsText(file) {
  // Load JSZip from CDN if not already loaded
  if (!window.JSZip) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
  }

  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const zip = await JSZip.loadAsync(e.target.result);
        const docXml = zip.file('word/document.xml');
        if (!docXml) { reject(new Error('Not a valid .docx file')); return; }
        const xmlText = await docXml.async('string');
        const text = parseWordXml(xmlText);
        resolve(text);
      } catch(err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function parseWordXml(xml) {
  // Parse word/document.xml and extract readable text preserving structure
  return xml
    .replace(/<w:br[^>]*\/>/gi, '\n')
    .replace(/<\/w:p>/gi, '\n')
    .replace(/<w:tab[^>]*\/>/gi, '\t')
    .replace(/<[^>]+>/g, '')
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"')
    .replace(/&apos;/g, "'")
    .replace(/&#x[0-9A-Fa-f]+;/g, ' ')
    .replace(/&#\d+;/g, ' ')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function parseTargetDate(dateStr) {
  if (!dateStr) return null;
  // Try to parse common UK date formats
  const d = new Date(dateStr);
  if (!isNaN(d)) return d.toISOString().split('T')[0];
  return null;
}

function renderChecklist(items) {
  if (!items.length) return `<div class="card"><div class="empty-state" style="padding:2rem"><p>No checklist items. Load a template or add items.</p></div></div>`;

  const categories = {};
  items.forEach(item => {
    const cat = item.category || 'General';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(item);
  });

  return Object.entries(categories).map(([cat, catItems]) => {
    const done = catItems.filter(i => i.completed).length;
    return `
    <div class="category-group">
      <div class="category-header">
        <span>${cat}</span>
        <span>${done}/${catItems.length}</span>
      </div>
      <div class="card card-sm">
        ${catItems.map(item => `
        <div class="checklist-item ${item.completed ? 'completed' : ''}" id="ci-${item.id}">
          <div class="checklist-cb ${item.completed ? 'checked' : ''}" onclick="toggleChecklistItem('${item.id}', ${!item.completed})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="checklist-content">
            <div class="checklist-milestone">${item.milestone}</div>
            <div class="checklist-meta">
              ${item.responsible ? `<span>${item.responsible}</span>` : ''}
              ${item.due_date ? `<span>Due: ${formatDate(item.due_date)}</span>` : ''}
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

async function toggleChecklistItem(id, completed) {
  try {
    await saveChecklistItem({ id, completed, completed_at: completed ? new Date().toISOString() : null });
    const el = document.getElementById(`ci-${id}`);
    if (el) {
      el.classList.toggle('completed', completed);
      el.querySelector('.checklist-cb').classList.toggle('checked', completed);
    }
    await updateDealProgress();
  } catch(e) { showNotif('Failed to update', 'error'); }
}

async function updateDealProgress() {
  const items = await loadChecklist(currentDeal.id);
  const total = items.length;
  const done = items.filter(i => i.completed).length;
  const progress = total > 0 ? Math.round((done / total) * 100) : 0;
  await saveDeal({ ...currentDeal, progress });
  currentDeal.progress = progress;
}

async function loadChecklistTemplate(role) {
  const items = role === 'buyer' ? getBuyerChecklist() : getSellerChecklist();
  try {
    for (let i = 0; i < items.length; i++) {
      await saveChecklistItem({ ...items[i], deal_id: currentDeal.id, order_index: i });
    }
    await switchDealTab('Checklist');
    showNotif(`${capitalize(role)} checklist loaded`, 'success');
  } catch(e) { showNotif('Failed to load template: ' + e.message, 'error'); }
}

    status.innerHTML = `<div style="color:var(--green);font-size:13px">✓ Connected — ${data.length} deals found</div>`;
  } catch(e) {
    status.innerHTML = `<div style="color:var(--red);font-size:13px">✗ ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════════
// MODAL SYSTEM
// ═══════════════════════════════════════════════════════
function openModal(html, extraClass = '') {
  document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal ${extraClass}">${html}</div>
  </div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
function handleOverlayClick(e) { if (e.target === e.currentTarget) closeModal(); }

// ═══════════════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════════════
let notifTimer;
function showNotif(text, type = 'success') {
  const el = document.getElementById('notif');
  document.getElementById('notif-text').textContent = text;
  el.className = `notif ${type}`;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════
function formatDate(str) {
  if (!str) return '—';
  try { return new Date(str).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); } catch(e) { return str; }
}
function formatCurrency(n) {
  if (!n) return '—';
  if (n >= 1000000) return `£${(n/1000000).toFixed(1)}m`;
  if (n >= 1000) return `£${(n/1000).toFixed(0)}k`;
  return `£${n.toLocaleString()}`;
}
function capitalize(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1) : ''; }
function fieldRow(label, value, mono = false) {
  return `<div style="display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)">
    <div style="font-size:12px;color:var(--text3);width:160px;flex-shrink:0;padding-top:1px">${label}</div>
    <div style="font-size:13.5px;color:${value?'var(--text)':'var(--text3)'};${mono?'font-family:var(--font-mono);font-size:12px':''}">${value || '—'}</div>
  </div>`;
}
